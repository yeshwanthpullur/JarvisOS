general:
  app_name: JARVIS OS
  environment: development
  debug: false

logging:
  level: INFO
  log_dir: logs
  log_file: jarvis-os.log
  max_bytes: 1048576
  backup_count: 5

memory:
  enabled: true
  storage_dir: memory
  task_store_dir: data/tasks
  vector_index_dir: data/vector-indexes

brain:
  enabled: true
  vault_path: data/obsidian-vault
  vault_name: Jarvis Brain
  auto_create_vault: true
  daily_note_format: "%Y-%m-%d"

models:
  default_model: "llama3.2:1b"
  fallback_model: ""
  allow_local_models: true

providers:
  default_provider: "ollama"
  enabled_providers:
    - "ollama"
  timeout_seconds: 60
  max_retries: 1
  track_costs: false
  definitions:
    openai:
      kind: "openai"
      enabled: false
      local_only: false
      base_url: "https://api.openai.com"
      api_key_env: "OPENAI_API_KEY"
      metadata:
        provider_family: "openai"

    anthropic:
      kind: "anthropic"
      enabled: false
      local_only: false
      base_url: "https://api.anthropic.com"
      api_key_env: "ANTHROPIC_API_KEY"
      metadata:
        provider_family: "anthropic"

    google:
      kind: "google_gemini"
      enabled: false
      local_only: false
      base_url: "https://generativelanguage.googleapis.com"
      api_key_env: "GOOGLE_API_KEY"
      metadata:
        provider_family: "gemini"

    deepseek:
      kind: "deepseek"
      enabled: false
      local_only: false
      base_url: "https://api.deepseek.com"
      api_key_env: "DEEPSEEK_API_KEY"
      metadata:
        provider_family: "deepseek"

    mistral:
      kind: "mistral"
      enabled: false
      local_only: false
      base_url: "https://api.mistral.ai"
      api_key_env: "MISTRAL_API_KEY"
      metadata:
        provider_family: "mistral"

    groq:
      kind: "groq"
      enabled: false
      local_only: false
      base_url: "https://api.groq.com"
      api_key_env: "GROQ_API_KEY"
      metadata:
        provider_family: "groq"

    openrouter:
      kind: "openrouter"
      enabled: false
      local_only: false
      base_url: "https://openrouter.ai/api"
      api_key_env: "OPENROUTER_API_KEY"
      metadata:
        provider_family: "openrouter"

    local:
      kind: "local"
      enabled: false
      local_only: true
      base_url: "http://127.0.0.1:11434"
      metadata:
        local: true
        runtime: "openai-compatible"

    ollama:
      kind: "ollama"
      enabled: true
      local_only: true
      base_url: "http://127.0.0.1:11434"
      preferred_model: "llama3.2:1b"
      default_model: "llama3.2:1b"
      timeout_seconds: 60
      max_retries: 1
      metadata:
        local: true
        runtime: "ollama"

agents:
  enabled: true
  max_concurrent_agents: 4
  workspace_dir: data/agent-workspaces

plugins:
  enabled: true
  plugin_dir: plugins
  allow_user_plugins: false
  auto_discover: true
  auto_enable: true
  compatibility_version: "0.1"

downloads:
  download_dir: data/downloads
  max_concurrent_downloads: 3
  verify_integrity: true

automation:
  enabled: false
  queue_dir: data/automation-queue
  max_concurrent_jobs: 2

security:
  secrets_dir: data/secrets
  allow_shell_execution: false
  allow_network_access: true
  require_confirmation_for_installers: true

desktop:
  enabled: true
  platform: windows
  downloads_folder: ""

mobile:
  enabled: false
  api_enabled: false
